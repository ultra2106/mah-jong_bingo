<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻雀ビンゴ 〜わいわい卓〜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@700;800&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --felt:#0e5c43; --felt-dark:#0a4633;
    --cream:#fdf6e6; --tile:#fffdf7;
    --red:#c8372a; --gold:#e0a839; --navy:#1f2a3d;
    --line:#e3d7bd;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; padding:28px 16px 60px;
    background:
      radial-gradient(circle at 50% 0%, var(--felt) 0%, var(--felt-dark) 100%);
    color:var(--navy);
    font-family:'Zen Maru Gothic', sans-serif;
    display:flex; flex-direction:column; align-items:center;
    min-height:100%;
    position:relative;
    overflow-x:hidden;
  }

  .bgTiles{
    position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none;
  }
  .bgTile{
    position:absolute;
    width:52px; height:70px;
    background:rgba(255,253,247,0.07);
    border:2px solid rgba(255,253,247,0.13);
    border-radius:8px;
    display:flex; align-items:center; justify-content:center;
  }
  .bgTile.kanji{
    font-family:'Shippori Mincho B1', serif;
    font-size:26px; font-weight:800;
    color:rgba(255,253,247,0.15);
  }

  .content{ position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; width:100%; }

  h1{
    font-family:'Shippori Mincho B1', serif;
    font-size:26px; font-weight:800; margin:0 0 2px;
    text-align:center; color:var(--cream);
    letter-spacing:1px;
  }
  .sub{ font-size:13px; color:var(--gold); margin-bottom:6px; font-weight:700; }
  .hint{ font-size:11px; color:rgba(253,246,230,0.65); margin-bottom:16px; }
  .tenhouBadge{
    font-size:12px; color:#fff; background:var(--red);
    padding:4px 12px; border-radius:12px; margin-bottom:10px;
    font-weight:800; display:none;
  }

  .card{
    background:var(--cream);
    border-radius:20px; padding:18px;
    box-shadow: 0 10px 0 rgba(0,0,0,0.18), 0 14px 24px rgba(0,0,0,0.25);
    max-width:420px; width:100%;
    border:3px solid var(--red);
    position:relative;
  }
  .card::before{
    content:"";
    position:absolute; inset:6px;
    border:1.5px dashed var(--gold);
    border-radius:14px;
    pointer-events:none;
  }

  .grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
    position:relative; z-index:1;
  }
  .grid.spinning .cell{ pointer-events:none; cursor:default; }
  .cell{
    aspect-ratio:1; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    text-align:center; padding:8px; font-size:13px; line-height:1.3;
    font-weight:700;
    cursor:pointer; background:var(--tile); color:var(--navy);
    border:2px solid var(--line);
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.06);
    transition:transform .12s, background .15s, box-shadow .15s;
    -webkit-user-select:none; user-select:none;
    -webkit-touch-callout:none;
    touch-action: manipulation;
  }
  .cell:active{ transform:scale(0.94); }
  .cell.checked{
    background:var(--red); color:#fff;
    border-color:var(--red);
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.25);
  }
  .cell.win{ outline:3px solid var(--gold); outline-offset:2px; }
  .cell.reach{
    animation: reachPulse 1s ease-in-out infinite;
    border-color: var(--gold);
  }
  @keyframes reachPulse{
    0%,100%{ box-shadow: inset 0 -4px 0 rgba(0,0,0,0.06), 0 0 0 0 rgba(224,168,57,0.7); }
    50%{ box-shadow: inset 0 -4px 0 rgba(0,0,0,0.06), 0 0 0 8px rgba(224,168,57,0); }
  }
  .cell.locking{ animation: lockPop .35s ease; }
  @keyframes lockPop{
    0%{ transform:scale(1.2); }
    60%{ transform:scale(0.94); }
    100%{ transform:scale(1); }
  }

  #revealBanner{
    margin-top:14px; font-family:'Shippori Mincho B1', serif;
    font-size:20px; color:var(--gold); font-weight:800;
    text-align:center; display:none;
    animation: pop .4s ease;
  }
  #reachBanner{
    margin-top:14px; font-family:'Shippori Mincho B1', serif;
    font-size:20px; color:var(--red); font-weight:800;
    text-align:center; display:none;
    animation: pop .4s ease;
  }
  #bingoBanner{
    margin-top:20px; font-family:'Shippori Mincho B1', serif;
    font-size:30px; color:var(--gold); font-weight:800;
    text-align:center; display:none;
    text-shadow: 0 3px 0 rgba(0,0,0,0.3);
    animation: pop .5s ease;
  }
  @keyframes pop{
    0%{ transform:scale(0.5); opacity:0; }
    60%{ transform:scale(1.15); opacity:1; }
    100%{ transform:scale(1); }
  }

  .resetBtn{
    margin-top:18px; padding:10px 24px; border-radius:24px;
    border:none; background:var(--gold); color:var(--navy); font-size:14px;
    font-weight:900; cursor:pointer; font-family:'Zen Maru Gothic', sans-serif;
    box-shadow: 0 4px 0 #a97e1f;
  }
  .resetBtn:active{ transform:translateY(3px); box-shadow:none; }
  .resetBtn:disabled{
    background:#8a8a80; color:#e5e5e0; box-shadow:none; cursor:default;
  }
  .usedNote{ color:var(--gold); font-size:12px; margin-top:10px; text-align:center; }

  .scoreLink{
    margin-top:22px; display:inline-flex; align-items:center; gap:6px;
    padding:9px 20px; border-radius:22px;
    background:rgba(253,246,230,0.1); border:1.5px solid var(--gold);
    color:var(--cream); font-size:13px; font-weight:700;
    text-decoration:none; font-family:'Zen Maru Gothic', sans-serif;
    transition:background .15s;
  }
  .scoreLink:hover{ background:rgba(253,246,230,0.18); }
  .scoreLink span{ color:var(--gold); font-size:15px; }

  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.55);
    display:none; align-items:center; justify-content:center; z-index:10;
    padding:20px;
  }
  .overlay.show{ display:flex; }
  .modal{
    background:var(--cream); border-radius:16px; padding:24px;
    max-width:320px; width:100%; text-align:center;
    border:3px solid var(--red);
  }
  .modal p{ font-weight:700; font-size:15px; margin:0 0 18px; }
  .modal .row{ display:flex; gap:10px; justify-content:center; }
  .modal button{
    flex:1; padding:10px 0; border-radius:20px; border:none;
    font-weight:900; font-size:14px; cursor:pointer;
    font-family:'Zen Maru Gothic', sans-serif;
  }
  .modal .yes{ background:var(--red); color:#fff; }
  .modal .no{ background:#e6e0d0; color:var(--navy); }

  .explainModal{
    background:var(--cream); border-radius:16px; padding:22px;
    max-width:320px; width:100%; text-align:left;
    border:3px solid var(--navy);
  }
  .explainModal h3{
    font-family:'Shippori Mincho B1', serif;
    font-size:18px; font-weight:800; margin:0 0 10px; color:var(--red);
    text-align:center;
  }
  .explainModal p{
    font-size:14px; line-height:1.7; margin:0 0 18px; font-weight:500;
    text-align:left;
  }
  .explainModal button{
    width:100%; padding:10px 0; border-radius:20px; border:none;
    background:var(--navy); color:var(--gold); font-weight:900; font-size:14px;
    cursor:pointer; font-family:'Zen Maru Gothic', sans-serif;
  }

  #tenhouFlash{
    position:fixed; inset:0; z-index:20; pointer-events:none; opacity:0;
    background: radial-gradient(circle, rgba(255,221,130,0.95) 0%, rgba(255,221,130,0) 68%);
  }
  #tenhouFlash.show{ animation: tenhouFlash 1.8s ease-out; }
  @keyframes tenhouFlash{
    0%{ opacity:0; }
    12%{ opacity:1; }
    100%{ opacity:0; }
  }
  #tenhouBanner{
    position:fixed; top:38%; left:50%; transform:translate(-50%,-50%) scale(0.3);
    font-family:'Shippori Mincho B1', serif;
    font-weight:800; color:var(--gold);
    text-shadow:0 0 24px rgba(0,0,0,0.55), 0 4px 0 rgba(0,0,0,0.4);
    z-index:21; display:none; text-align:center; opacity:0;
    font-size:42px;
  }
  #tenhouBanner span{
    display:block; font-family:'Zen Maru Gothic', sans-serif;
    font-size:16px; color:#fff; margin-top:6px; font-weight:700;
  }
  #tenhouBanner.show{
    display:block;
    animation: tenhouPop 2.4s ease forwards;
  }
  @keyframes tenhouPop{
    0%{ opacity:0; transform:translate(-50%,-50%) scale(0.3); }
    20%{ opacity:1; transform:translate(-50%,-50%) scale(1.25); }
    35%{ transform:translate(-50%,-50%) scale(1); }
    80%{ opacity:1; }
    100%{ opacity:0; }
  }
</style>
</head>
<body>

<div class="bgTiles" id="bgTiles"></div>
<div id="tenhouFlash"></div>
<div id="tenhouBanner">🌟 天和 🌟<span>奇跡の配牌です！</span></div>

<div class="content">
  <h1>麻雀ビンゴ 〜わいわい卓〜</h1>
  <div class="sub" id="subtitle">あなた専用のビンゴカード</div>
  <div class="tenhouBadge" id="tenhouBadge">🌟 天和達成 🌟</div>
  <div class="hint">マスを長押しすると役の説明が見られます</div>

  <div class="card">
    <div class="grid" id="grid"></div>
  </div>

  <div id="revealBanner">カード決定！</div>
  <div id="reachBanner">リーチ！</div>
  <div id="bingoBanner">🀄 ビンゴ！ 🀄</div>
  <button class="resetBtn" id="resetBtn" onclick="askReshuffle()">カードを引き直す(最大2回)</button>
  <div class="usedNote" id="usedNote" style="display:none;"></div>

  <a class="scoreLink" href="https://ultra2106.github.io/mahjong/" target="_blank" rel="noopener">
    <span>🧮</span>点数計算はこちら
  </a>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <p>本当に引き直しますか？<br>この操作は残り回数を1回消費します。</p>
    <div class="row">
      <button class="yes" onclick="confirmReshuffle()">はい、引き直す</button>
      <button class="no" onclick="closeModal()">やめる</button>
    </div>
  </div>
</div>

<div class="overlay" id="explainOverlay">
  <div class="explainModal">
    <h3 id="explainTitle"></h3>
    <p id="explainBody"></p>
    <button onclick="closeExplain()">わかった！</button>
  </div>
</div>

<script>
// --- 背景に牌をランダム散らす（東南西北中發白のみ、各4個・計28個） ---
const KANJI_CHARS = ["東","南","西","北","中","發","白"];
const TILE_PER_CHAR = 4;
const bgTiles = document.getElementById("bgTiles");

let tileList = [];
KANJI_CHARS.forEach(ch => {
  for(let i=0;i<TILE_PER_CHAR;i++) tileList.push(ch);
});
tileList = tileList.sort(() => Math.random() - 0.5);

tileList.forEach(ch => {
  const t = document.createElement("div");
  t.className = "bgTile kanji";
  t.textContent = ch;
  const scale = 0.7 + Math.random()*0.7;
  t.style.left = Math.random()*92 + "vw";
  t.style.top = Math.random()*450 + "vh";
  t.style.transform = "rotate(" + (Math.random()*60 - 30) + "deg) scale(" + scale.toFixed(2) + ")";
  bgTiles.appendChild(t);
});

// 判定・データ用の元テキスト（中央固定のリーチは "R" として通常マス扱い）
const ITEM_TEXT = {
  A:"東", B:"南", C:"西", D:"北",
  E:"白・發・中",
  F:"ドラ", G:"赤ドラ", H:"一発",
  I:"断么九（タンヤオ）", J:"平和（ピンフ）", K:"一盃口（イーペーコー）",
  L:"ロン", M:"対々和（トイトイ）", N:"一気通貫（イッツー）",
  O:"七対子（チートイツ）", P:"混一色・清一色（ホンイツ・チンイツ）",
  Q:"満貫以上", R2:"カン", S:"副露2回以上", T:"麻雀ギャグ", U:"役満",
  R:"リーチ"
};

// 表示専用（改行位置を指定）
const ITEM_DISPLAY = {
  A:"東", B:"南", C:"西", D:"北",
  E:"白・發・中",
  F:"ドラ", G:"赤ドラ", H:"一発",
  I:"断么九<br>（タンヤオ）", J:"平和<br>（ピンフ）", K:"一盃口<br>（イーペーコー）",
  L:"ロン", M:"対々和<br>（トイトイ）", N:"一気通貫<br>（イッツー）",
  O:"七対子<br>（チートイツ）", P:"混一色<br>清一色",
  Q:"満貫以上<br>（4翻以上）", R2:"カン", S:"副露2回<br>以上", T:"麻雀ギャグ", U:"役満",
  R:"リーチ"
};

// 初心者向けの役説明（長押しで表示）
const ITEM_EXPLAIN = {
  A:"自分の風（自風）が東、もしくは場風が東のときに、「東」の牌を刻子として使ってあがると付く役です。",
  B:"自分の風（自風）が南、もしくは場風が南ののときに、「南」の牌を刻子として使ってあがると付く役です。",
  C:"自分の風（自風）が西のときに、「西」の牌を刻子として使ってあがると付く役です。",
  D:"自分の風（自風）が北のときに、「北」の牌を刻子として使ってあがると付く役です。",
  E:"白・發・中のいずれかを刻子（同じ牌3枚）として使ってあがると付く役（役牌）です。",
  F:"手牌の中に「ドラ」（その局で決められた特別な牌）が含まれた状態であがることです。ドラ自体は役ではなく点数を上げるおまけの牌です。",
  G:"手牌の中に「赤ドラ」（赤色の5の牌）が含まれた状態であがることです。こちらも役ではなく点数を上げるおまけの牌です。",
  H:"リーチをかけてから、自分の次の1巡以内にあがると付く役です。",
  I:"1・9の数牌と字牌をまったく使わず、2～8の中間の牌だけであがる役です。初心者にも狙いやすい役の一つです。",
  J:"符が付かない形（雀頭が役牌以外・すべて順子・両面待ちなど）であがる役です。手役の基本となる役の一つです。",
  K:"同じ並び・同じ柄の順子（例：筒子の2・3・4）が2組そろっている役です。細かい条件があるので、慣れてきたら狙ってみてください。",
  L:"他家が捨てた牌であがることです。自分でツモった牌ではなく、人が捨てた牌をもらってあがる形を指します。",
  M:"4つの面子がすべて刻子（同じ牌3枚）または槓子でできている役です。ポンやカンを多用する手でよく出ます。",
  N:"同じ種類の数牌で1〜9をすべて使った形（123・456・789）であがる役です。並べるのが楽しい役の一つです。",
  O:"同じ牌のペアを7組そろえてあがる特殊な形の役です。通常の4面子1雀頭とは違う、ちょっと変わったあがり方です。",
  P:"手牌が1種類の数牌と字牌だけでそろっている（混一色）、または字牌を使わず1種類の数牌だけでそろっている（清一色）役です。",
  Q:"あがったときの点数が満貫（子:8000点,親:12000点）以上、翻数でいうと4翻以上になる大きい手のことです。",
  R2:"他家の捨て牌や自分の手牌を使って「カン」（同じ牌4枚を晒す、または追加する）をすることです。大明槓・暗槓のどちらでも対象です。",
  S:"チーやポンなどの「副露」を、1局のうちに2回以上している状態であがる。",
  T:"麻雀中に発した一言やボケで、卓を囲む2人以上を実際に笑わせることです。頑張ってください！",
  U:"役満（満貫よりもさらに大きい、麻雀で最高クラスの役）をあがることです。滅多に出ない特別な達成です。",
  R:"テンパイ（あと1枚であがれる状態）のときに「リーチ」を宣言し、そのままあがることです。宣言後は手牌を替えられなくなりますが、一発や裏ドラなどのチャンスが生まれます。"
};

// ★出現率（重み）：外側8マスの抽選対象（Rは中央固定なのでここには含めません）
const WEIGHTS = {
  A:20, B:20, C:20, D:20,
  E:20, F:20, G:20, H:20,
  I:20, J:20, K:20,
  L:20, M:20, N:20,
  O:20, P:20,
  Q:20, R2:20, S:20, T:1, U:1
};

const POOL = Object.keys(WEIGHTS); // 外側8マス用の21項目（Rは含まない）
const SPIN_TEXTS = Object.values(ITEM_DISPLAY);

// 重み付きで、重複なくk個選ぶ関数
function weightedSample(pool, weights, k){
  const items = pool.map(code => ({ code, w: weights[code] ?? 1 }));
  const result = [];
  for(let n=0; n<k && items.length>0; n++){
    const total = items.reduce((s,it)=>s+it.w, 0);
    let r = Math.random()*total;
    let idx = 0;
    for(; idx<items.length; idx++){
      r -= items[idx].w;
      if(r <= 0) break;
    }
    if(idx >= items.length) idx = items.length - 1;
    result.push(items[idx].code);
    items.splice(idx, 1);
  }
  return result;
}

// ★天和の確率。テスト時はここを一時的に大きくしてOKです（本番前に1/1000へ戻してください）
const TENHOU_CHANCE = 1/1000;
function rollTenhou(){
  return Math.random() < TENHOU_CHANCE;
}

const CARD_KEY = "mahjongBingoCard_v1";
const CHECKED_KEY = "mahjongBingoChecked_v1";
const RESHUFFLE_COUNT_KEY = "mahjongBingoReshuffleCount_v1"; // 使った引き直し回数
const TENHOU_KEY = "mahjongBingoTenhou_v1";

// ★引き直しできる最大回数。ここの数字を変えれば回数を調整できます。
const MAX_RESHUFFLES = 2;

let layout = JSON.parse(localStorage.getItem(CARD_KEY) || "null");
let isFreshLayout = false;
let checked;

if(!layout){
  layout = weightedSample(POOL, WEIGHTS, 8);
  localStorage.setItem(CARD_KEY, JSON.stringify(layout));
  isFreshLayout = true;

  if(rollTenhou()){
    checked = new Array(9).fill(true);
    localStorage.setItem(TENHOU_KEY, "1");
  } else {
    checked = new Array(9).fill(false); // 中央のリーチも他と同じく最初は未チェック
  }
  localStorage.setItem(CHECKED_KEY, JSON.stringify(checked));
} else {
  checked = JSON.parse(localStorage.getItem(CHECKED_KEY) || "null");
  if(!checked || checked.length !== 9){
    checked = new Array(9).fill(false);
  }
}

function saveChecked(){
  localStorage.setItem(CHECKED_KEY, JSON.stringify(checked));
}

const isTenhou = localStorage.getItem(TENHOU_KEY) === "1";
if(isTenhou){
  document.getElementById("tenhouBadge").style.display = "inline-block";
}

const gridEl = document.getElementById("grid");
const LONG_PRESS_MS = 500;

function attachCellEvents(cell, i, code){
  let pressTimer = null;
  let longPressed = false;

  const startPress = () => {
    longPressed = false;
    pressTimer = setTimeout(() => {
      longPressed = true;
      openExplain(code);
    }, LONG_PRESS_MS);
  };
  const cancelPress = () => clearTimeout(pressTimer);
  const endPress = () => {
    clearTimeout(pressTimer);
    if(!longPressed){
      checked[i] = !checked[i];
      cell.classList.toggle("checked", checked[i]);
      saveChecked();
      checkBingo();
    }
  };

  cell.addEventListener("pointerdown", startPress);
  cell.addEventListener("pointerup", endPress);
  cell.addEventListener("pointerleave", cancelPress);
  cell.addEventListener("pointercancel", cancelPress);
  cell.addEventListener("contextmenu", (e) => e.preventDefault());
}

function renderGrid(animate){
  gridEl.innerHTML = "";
  // 中央固定は "R"（リーチ）。他の通常マスと同じ扱いです。
  const gridOrder = [layout[0],layout[1],layout[2],layout[3],"R",layout[4],layout[5],layout[6],layout[7]];
  gridOrder.forEach((code, i) => {
    const cell = document.createElement("div");
    cell.className = "cell" + (checked[i] ? " checked" : "");
    cell.innerHTML = ITEM_DISPLAY[code];
    attachCellEvents(cell, i, code);
    gridEl.appendChild(cell);
  });
  checkBingo();

  if(animate){
    runSlotReveal(gridOrder);
  }
}

function runSlotReveal(gridOrder){
  const cells = gridEl.children;
  gridEl.classList.add("spinning");

  const finalHTML = gridOrder.map(code => ITEM_DISPLAY[code]);
  const columns = [
    { indices:[0,3,6], duration:800 },
    { indices:[1,4,7], duration:800 },
    { indices:[2,5,8], duration:800 } // 中央(4)もここで一緒に回る
  ];

  let colStep = 0;

  function spinColumn(col){
    const timers = col.indices.map(idx => {
      return setInterval(() => {
        cells[idx].innerHTML = SPIN_TEXTS[Math.floor(Math.random()*SPIN_TEXTS.length)];
      }, 65);
    });

    setTimeout(() => {
      timers.forEach(t => clearInterval(t));
      col.indices.forEach(idx => {
        cells[idx].innerHTML = finalHTML[idx];
        cells[idx].classList.add("locking");
        setTimeout(() => cells[idx].classList.remove("locking"), 350);
      });

      colStep++;
      if(colStep < columns.length){
        spinColumn(columns[colStep]);
      } else {
        gridEl.classList.remove("spinning");
        const banner = document.getElementById("revealBanner");
        banner.style.display = "block";
        setTimeout(() => { banner.style.display = "none"; }, 1300);

        if(isTenhou){
          setTimeout(() => triggerTenhouEffect(), 200);
        }
      }
    }, col.duration);
  }

  spinColumn(columns[0]);
}

function triggerTenhouEffect(){
  const flash = document.getElementById("tenhouFlash");
  const banner = document.getElementById("tenhouBanner");
  const cells = gridEl.children;
  for(const c of cells){
    c.classList.add("checked");
  }
  flash.classList.remove("show"); void flash.offsetWidth;
  flash.classList.add("show");
  banner.classList.remove("show"); void banner.offsetWidth;
  banner.classList.add("show");
  checkBingo();
}

renderGrid(isFreshLayout);

function openExplain(code){
  document.getElementById("explainTitle").textContent = ITEM_TEXT[code];
  document.getElementById("explainBody").textContent = ITEM_EXPLAIN[code];
  document.getElementById("explainOverlay").classList.add("show");
}
function closeExplain(){
  document.getElementById("explainOverlay").classList.remove("show");
}

function checkBingo(){
  const lines = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  const cells = gridEl.children;
  let won = false;
  const reachIndices = new Set();

  for(const c of cells){ c.classList.remove("win"); c.classList.remove("reach"); }

  for(const line of lines){
    const count = line.filter(idx => checked[idx]).length;
    if(count === 3){
      won = true;
      line.forEach(idx => cells[idx].classList.add("win"));
    } else if(count === 2){
      const remain = line.find(idx => !checked[idx]);
      reachIndices.add(remain);
    }
  }

  reachIndices.forEach(idx => {
    if(!cells[idx].classList.contains("win")){
      cells[idx].classList.add("reach");
    }
  });

  document.getElementById("bingoBanner").style.display = won ? "block" : "none";
  document.getElementById("reachBanner").style.display = (!won && reachIndices.size > 0) ? "block" : "none";
}

const resetBtn = document.getElementById("resetBtn");
const usedNote = document.getElementById("usedNote");
const overlay = document.getElementById("overlay");

function getReshuffleCount(){
  return parseInt(localStorage.getItem(RESHUFFLE_COUNT_KEY) || "0", 10);
}

function updateReshuffleUI(){
  const used = getReshuffleCount();
  const remaining = MAX_RESHUFFLES - used;

  if(remaining <= 0){
    resetBtn.disabled = true;
    resetBtn.style.display = "none";
    usedNote.textContent = `引き直しは${MAX_RESHUFFLES}回とも使用済みです`;
    usedNote.style.display = "block";
  } else {
    resetBtn.disabled = false;
    resetBtn.style.display = "inline-block";
    if(used > 0){
      usedNote.textContent = `残り引き直し回数：あと${remaining}回`;
      usedNote.style.display = "block";
    } else {
      usedNote.style.display = "none";
    }
  }
}
updateReshuffleUI();

function askReshuffle(){
  overlay.classList.add("show");
}
function closeModal(){
  overlay.classList.remove("show");
}
function confirmReshuffle(){
  layout = weightedSample(POOL, WEIGHTS, 8);
  localStorage.setItem(CARD_KEY, JSON.stringify(layout));

  localStorage.removeItem(TENHOU_KEY);
  document.getElementById("tenhouBadge").style.display = "none";

  if(rollTenhou()){
    checked = new Array(9).fill(true);
    localStorage.setItem(TENHOU_KEY, "1");
  } else {
    checked = new Array(9).fill(false);
  }
  saveChecked();

  document.getElementById("bingoBanner").style.display = "none";
  document.getElementById("reachBanner").style.display = "none";

  const used = getReshuffleCount() + 1;
  localStorage.setItem(RESHUFFLE_COUNT_KEY, String(used));

  location.reload();
}
</script>
